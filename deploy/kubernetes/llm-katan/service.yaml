---
# Headless service for all llm-katan instances (for service discovery)
apiVersion: v1
kind: Service
metadata:
  name: llm-katan-all
  labels:
    app: llm-katan
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: llm-katan
