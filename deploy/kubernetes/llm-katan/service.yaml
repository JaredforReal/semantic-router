apiVersion: v1
kind: Service
metadata:
  name: llm-katan-gpt
  labels:
    app: llm-katan
    instance: gpt
    model: gpt-3.5-turbo
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: llm-katan
    instance: gpt
---
apiVersion: v1
kind: Service
metadata:
  name: llm-katan-claude
  labels:
    app: llm-katan
    instance: claude
    model: claude-3-haiku
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: llm-katan
    instance: claude
---
apiVersion: v1
kind: Service
metadata:
  name: llm-katan-llama
  labels:
    app: llm-katan
    instance: llama
    model: Meta-Llama-3.1-8B
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
