apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vllm-semantic-router-system

resources:
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml  # Only if using Prometheus Operator

# Uncomment if using Prometheus Operator
# Otherwise, remove servicemonitor.yaml from resources above
# labels:
#   - pairs:
#       monitoring: prometheus
#     includeSelectors: true

commonLabels:
  app.kubernetes.io/part-of: semantic-router
  app.kubernetes.io/component: llm-backend
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/vllm-project/semantic-router/llm-katan
    newTag: latest  # Pin to specific version in production

# ConfigMap generator for dynamic configuration
configMapGenerator:
  - name: llm-katan-env
    literals:
      - YLLM_BACKEND=transformers
      - LOG_LEVEL=INFO

# Patches for environment-specific customization
patches:
  # Increase resources for production
  - target:
      kind: Deployment
      labelSelector: "app=llm-katan"
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"

# Uncomment to enable HPA (Horizontal Pod Autoscaler)
# - hpa.yaml
