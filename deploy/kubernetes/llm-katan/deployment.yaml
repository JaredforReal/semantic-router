apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-katan-gpt
  labels:
    app: llm-katan
    model: gpt-3.5-turbo
    instance: gpt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-katan
      instance: gpt
  template:
    metadata:
      labels:
        app: llm-katan
        instance: gpt
        model: gpt-3.5-turbo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: llm-katan
        image: ghcr.io/vllm-project/semantic-router/llm-katan:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 8000
          protocol: TCP
        env:
        - name: HUGGINGFACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-token
              key: token
              optional: true
        - name: YLLM_MODEL
          valueFrom:
            configMapKeyRef:
              name: llm-katan-config
              key: default_model
        - name: YLLM_BACKEND
          valueFrom:
            configMapKeyRef:
              name: llm-katan-config
              key: backend
        command:
        - llm-katan
        - --model
        - $(YLLM_MODEL)
        - --served-model-name
        - gpt-3.5-turbo
        - --host
        - "0.0.0.0"
        - --port
        - "8000"
        - --max-tokens
        - "512"
        - --temperature
        - "0.7"
        - --log-level
        - INFO
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
      restartPolicy: Always
---
